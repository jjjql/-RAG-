# Windows / Linux：gateway + Redis（SYS-FUNC-01）
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      GATEWAY_REDIS_ADDR: redis:6379
      # 相似请求合并（coalesce）：集成脚本并行同 query 段依赖此项
      GATEWAY_COALESCE_ENABLED: "true"
      GATEWAY_COALESCE_MODE: "local"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    command: ["-config", "/app/config.yaml"]
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
